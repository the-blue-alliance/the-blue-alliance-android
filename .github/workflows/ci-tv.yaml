name: CI — Android TV

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tv-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build debug APK
        run: ./gradlew :tv:assembleDebug --stacktrace
      - name: Run unit tests
        run: ./gradlew :tv:testDebugUnitTest --stacktrace

  tv-release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Create CI signing config
        run: |
          keytool -genkey -v -keystore release.keystore -keyalg RSA -keysize 2048 -validity 1 -storepass android -alias ci -keypass android -dname "CN=CI,O=CI,C=US"
          cat > local.properties << 'EOF'
          release.store.file=release.keystore
          release.store.password=android
          release.key.alias=ci
          release.key.password=android
          EOF
      - name: Build release APK
        run: ./gradlew :tv:assembleRelease --stacktrace
